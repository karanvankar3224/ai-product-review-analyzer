<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
         <nav class="navbar glass">
            <div class="logo">AI Reviews Analyzer</div>

            <div class="nav-right">
                <button class="profile-btn">👤</button>
                <button class="logout-btn" onclick="logout()">↩</button>
            </div>
         </nav>
         <!-- Profile Card -->
          <div class="glass" style="max-width: 500px; margin: 40px auto; padding: 30px; text-align: center;">
              <h2 style="margin-bottom: 20px;">User Profile</h2>
              <p><strong>Name:</strong> {{ user.name }}</p>
              <p><strong>Email:</strong> {{ user.email }}</p>
              <p><strong>Joined:</strong> {{ user.joined }}</p>
              <br>

              <button class="profile-btn" onclick="window.location.href='/home'">Home</button>
          </div>
    </div>
    <script>
        function logout() {
            window.location.href = '/logout';
        }
    </script>
</body>
</html>
